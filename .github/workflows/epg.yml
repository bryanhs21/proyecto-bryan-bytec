name: Generar EPG

permissions:
  contents: write

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar requests
        run: pip install requests

      - name: Ejecutar script
        run: python epg.py

      - name: Subir XML
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add epg.xml || echo "No file"
          git commit -m "Actualizar EPG" || echo "Sin cambios"
          git push
